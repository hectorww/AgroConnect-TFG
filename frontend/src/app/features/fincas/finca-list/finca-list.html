<div class="card p-4 shadow-2 border-round-xl m-3">
  <div class="flex align-items-center justify-content-between mb-4">
      <h2 class="m-0 text-primary">
          <i class="pi pi-map mr-2 text-3xl"></i>Mis Parcelas Agricolas
      </h2>
      <p-button label="Nueva Finca" icon="pi pi-plus" severity="success" [raised]="true"></p-button>
  </div>

  <p-table #dt [value]="fincas" [rows]="6" [paginator]="true" 
           [globalFilterFields]="['nombre', 'cultivo']" [loading]="loading"
           [rowHover]="true" styleClass="p-datatable-sm"
           [showCurrentPageReport]="true"
           currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} fincas">
    
    <ng-template pTemplate="caption">
      <div class="flex justify-content-end">
          <p-iconField iconPosition="left">
              <p-inputIcon styleClass="pi pi-search"></p-inputIcon>
              <input pInputText type="text" (input)="dt.filterGlobal($any($event.target).value, 'contains')" placeholder="Buscar por nombre o cultivo..." />
          </p-iconField>
      </div>
    </ng-template>

    <ng-template pTemplate="header">
    <tr>
        <th pSortableColumn="nombre" style="width: 30%">Nombre <p-sortIcon field="nombre"></p-sortIcon></th>
        <th pSortableColumn="cultivo" style="width: 25%">Cultivo <p-sortIcon field="cultivo"></p-sortIcon></th>
        <th pSortableColumn="hectareas" style="width: 20%">Extensión <p-sortIcon field="hectareas"></p-sortIcon></th>
        <th style="width: 15rem">Acciones</th> </tr>
    </ng-template>

    <ng-template pTemplate="body" let-finca>
      <tr>
        <td class="font-bold">{{finca.nombre}}</td>
        <td>
            <p-tag [value]="finca.cultivo" severity="secondary"></p-tag>
        </td>
        <td>{{finca.hectareas}} ha</td>
        <td>
          <div class="flex gap-2">
            <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" [severity]="'warn'"></p-button>

            <p-button icon="pi pi-trash" [rounded]="true" [text]="true" [severity]="'danger'"></p-button>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
