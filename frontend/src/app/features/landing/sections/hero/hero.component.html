<section id="hero" class="hero">
  <!-- Three.js Canvas - full screen -->
  <canvas #heroCanvas class="hero-canvas"></canvas>

  <!-- Dark gradient overlay for text readability -->
  <div class="hero-overlay"></div>

  <!-- Hero Content - Asymmetric layout -->
  <div class="hero-content-wrapper">
    <div class="hero-content">
      <span class="hero-badge">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        Sistema de Gestión Inteligente
      </span>

      <h1 class="hero-title">
        <span class="word">Tu campo,</span>
        <span class="word highlight">inteligente.</span>
      </h1>

      <p class="hero-subtitle">
        Monitoriza tus fincas, anticipa riesgos climáticos y toma decisiones con datos en tiempo real.
      </p>

      <div class="hero-cta-group">
        <button class="btn-primary" (click)="goToRegister()">
          Comenzar gratis
        </button>
        <button class="btn-ghost" (click)="goToLogin()">
          Ver demo →
        </button>
      </div>
    </div>

    <!-- Stats - Right side -->
    <div class="hero-stats">
      <div class="stat-item">
        <span class="stat-number">+2.400</span>
        <span class="stat-label">agricultores</span>
      </div>
      <div class="stat-item">
        <span class="stat-number">98%</span>
        <span class="stat-label">precisión alertas</span>
      </div>
      <div class="stat-item">
        <span class="stat-number">+18.000</span>
        <span class="stat-label">hectáreas gestionadas</span>
      </div>
    </div>
  </div>

  <!-- Scroll Hint - Centered bottom -->
  <div class="hero-scroll-hint">
    <span class="scroll-text">SCROLL</span>
    <div class="scroll-line"></div>
  </div>
</section>
